<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola León</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
        }

        .caja{
            background:rgba(255,255,255,.1);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,.2);
            padding:50px;
            border-radius:20px;
            text-align:center;
            color:white;
            animation:entrada 1.5s;
        }

        h1{
            font-size:70px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            margin-bottom:30px;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:30px;
            font-size:18px;
            cursor:pointer;
            background:#00d4ff;
            color:black;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.1);
        }

        @keyframes entrada{
            from{
                opacity:0;
                transform:translateY(50px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="caja">
    <h1>🦁 Hola León 🦁</h1>

    <p>Esta es una página de prueba creada con GitHub Pages.</p>

    <button onclick="saludar()">Haz clic aquí</button>

    <h2 id="mensaje" style="margin-top:30px;"></h2>
</div>

<script>
function saludar(){
    document.getElementById("mensaje").innerHTML="¡Bienvenido, León! 🚀";
}
</script>

</body>
</html>
