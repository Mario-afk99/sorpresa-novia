<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Años - Mi Amor 💕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,rgba(245,230,211,0.9),rgba(232,212,184,0.9)),url('cow-print-pattern-aesthetic-jpg-0bn2yblop9zb1lvn.jpg') center/cover no-repeat}
body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,248,240,0.05);z-index:0;pointer-events:none}
#portada{text-align:center;z-index:100;position:relative}
h1{font-size:60px;margin-bottom:20px;color:#f4a460;letter-spacing:2px;font-weight:bold;text-shadow:2px 2px 4px rgba(0,0,0,0.2)}
.subtitulo{font-size:28px;color:#d4949f;margin-bottom:15px;text-shadow:1px 1px 3px rgba(0,0,0,0.1)}
.descripcion{font-size:18px;color:#d4949f;margin-bottom:30px;line-height:1.6;text-shadow:1px 1px 2px rgba(0,0,0,0.1)}
#contenedor-libro{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50}
.pagina{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:850px;height:80vh;background:rgba(255,248,240,0.98);border-radius:15px;padding:40px;text-align:left;display:flex;flex-direction:column;align-items:flex-start}
.foto-contenedor{flex:1;display:flex;justify-content:center;align-items:center;max-height:400px}
.foto-contenedor img{max-width:100%;max-height:100%;border-radius:12px;border:2px solid #d4949f;box-shadow:0 0 30px rgba(255,192,203,0.5);object-fit:cover;animation:despliegue 0.8s cubic-bezier(0.2,0.9,0.2,1)}
@keyframes despliegue{0%{transform:scale(0) rotateX(90deg);opacity:0}50%{opacity:1}100%{transform:scale(1) rotateX(0deg);opacity:1}}
.frases-contenedor{margin-top:20px;min-height:120px;display:flex;flex-direction:column;justify-content:center}
.frase-principal{font-size:20px;color:#d4949f;line-height:1.6;font-style:italic;margin-bottom:10px;min-height:60px}
.frase-secundaria{font-size:18px;color:#f4a460;font-weight:bold;min-height:30px}
.intro-titulo{font-size:40px;color:#f4a460;margin-bottom:30px;font-weight:bold}
.intro-texto{font-size:18px;color:#d4949f;line-height:1.8;margin-bottom:30px;min-height:200px}
.intro-firma{font-size:20px;color:#f4a460;font-style:italic;margin-top:30px;font-weight:bold}
.bienvenida-titulo{font-size:38px;color:#f4a460;margin-bottom:20px;font-weight:bold}
.bienvenida-subtitulo{font-size:28px;color:#d4949f}
.mensaje-final{font-size:20px;color:#d4949f;line-height:1.8;min-height:300px}
.controles{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:200}
button{padding:12px 16px;font-size:18px;border:none;border-radius:50%;cursor:pointer;background:none;color:#dc143c;font-weight:bold;transition:all 0.2s ease;width:50px;height:50px;display:flex;justify-content:center;align-items:center}
button:hover{transform:scale(1.15) translateY(-5px);filter:drop-shadow(0 0 12px rgba(220,20,60,0.6))}
button:disabled{opacity:0.4;cursor:not-allowed}
.contador{position:fixed;top:15px;right:15px;font-size:14px;color:#d4949f;background:rgba(255,248,240,0.85);padding:8px 18px;border-radius:50px;border:2px solid #d4949f;z-index:200;font-weight:bold}
.corazon-inicio{font-size:50px;animation:latir 1.5s ease-in-out infinite;margin-bottom:15px}
@keyframes latir{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.boton-inicio{padding:12px 40px;font-size:16px;background:linear-gradient(135deg,#f4a460,#ffd700);color:#8b5a5a;border:2px solid #d4949f;border-radius:50px;box-shadow:0 0 12px rgba(255,192,203,0.4)}
.boton-inicio:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 0 20px rgba(255,192,203,0.6)}
@keyframes subirRosa{0%{transform:translateY(0) rotateZ(0deg);opacity:0.8}100%{transform:translateY(-120vh) rotateZ(360deg);opacity:0}}
.rosas{position:fixed;font-size:35px;pointer-events:none;z-index:250;animation:subirRosa 8s linear forwards}
.vaquita{position:fixed;font-size:40px;pointer-events:none;z-index:5;animation:caminar 8s linear infinite}
@keyframes caminar{0%{transform:translateX(-100px) scaleX(-1)}50%{transform:translateX(100px) scaleX(-1)}100%{transform:translateX(-100px) scaleX(-1)}}
.control-audio{position:fixed;bottom:80px;right:20px;z-index:200;background:rgba(255,248,240,0.9);border:2px solid #d4949f;border-radius:50%;width:50px;height:50px;display:flex;justify-content:center;align-items:center}
.control-audio:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(255,192,203,0.6)}
</style>
</head>
<body>

<audio id="musica" loop>
  <source src="Sebastián Yatra - No hay nadie más  LETRA(MP3_160K).mp3" type="audio/mpeg">
</audio>

<div id="portada">
  <div class="corazon-inicio">💕</div>
  <h1>5 AÑOS JUNTOS</h1>
  <div class="subtitulo">Mi Preciosa (Daylin)</div>
  <div class="descripcion">Cinco años contigo han sido los más hermosos.<br>Este es un pequeño regalo lleno de amor para ti.</div>
  <button class="boton-inicio" onclick="abrir()" title="Abrir el libro">Abrir💕</button>
</div>

<div id="contenedor-libro">
  <div class="pagina" id="pag0">
    <div class="bienvenida-titulo">BIENVENIDA❤️✨</div>
    <div class="bienvenida-subtitulo">A Nuestro Libro de Amor</div>
  </div>

  <div class="pagina" id="pag1">
    <div class="intro-titulo">💌 Una Carta Para Ti 💌</div>
    <div class="intro-texto" id="intro-dinamico"></div>
    <div class="intro-firma">Con todo mi amor,<br> Mario❤️</div>
  </div>

  <div class="pagina" id="pag2"><div class="foto-contenedor"><img src="IMG-20250405-WA0028.jpg" loading="lazy" alt="Foto 1"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag2-principal"></div><div class="frase-secundaria" id="frase-pag2-secundaria"></div></div></div>
  <div class="pagina" id="pag3"><div class="foto-contenedor"><img src="IMG-20250412-WA0011.jpg" loading="lazy" alt="Foto 2"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag3-principal"></div><div class="frase-secundaria" id="frase-pag3-secundaria"></div></div></div>
  <div class="pagina" id="pag4"><div class="foto-contenedor"><img src="IMG-20250520-WA0007.jpg" loading="lazy" alt="Foto 3"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag4-principal"></div><div class="frase-secundaria" id="frase-pag4-secundaria"></div></div></div>
  <div class="pagina" id="pag5"><div class="foto-contenedor"><img src="IMG-20250720-WA0030.jpg" loading="lazy" alt="Foto 4"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag5-principal"></div><div class="frase-secundaria" id="frase-pag5-secundaria"></div></div></div>
  <div class="pagina" id="pag6"><div class="foto-contenedor"><img src="IMG-20250725-WA0026.jpg" loading="lazy" alt="Foto 5"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag6-principal"></div><div class="frase-secundaria" id="frase-pag6-secundaria"></div></div></div>
  <div class="pagina" id="pag7"><div class="foto-contenedor"><img src="IMG-20250824-WA0014.jpg" loading="lazy" alt="Foto 6"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag7-principal"></div><div class="frase-secundaria" id="frase-pag7-secundaria"></div></div></div>
  <div class="pagina" id="pag8"><div class="foto-contenedor"><img src="IMG-20250824-WA0016.jpg" loading="lazy" alt="Foto 7"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag8-principal"></div><div class="frase-secundaria" id="frase-pag8-secundaria"></div></div></div>
  <div class="pagina" id="pag9"><div class="foto-contenedor"><img src="IMG-20260102-WA0027.jpg" loading="lazy" alt="Foto 8"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag9-principal"></div><div class="frase-secundaria" id="frase-pag9-secundaria"></div></div></div>
  <div class="pagina" id="pag10"><div class="foto-contenedor"><img src="IMG-20260306-WA0050.jpg" loading="lazy" alt="Foto 9"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag10-principal"></div><div class="frase-secundaria" id="frase-pag10-secundaria"></div></div></div>
  <div class="pagina" id="pag11"><div class="foto-contenedor"><img src="IMG-20260403-WA0049.jpg" loading="lazy" alt="Foto 10"></div><div class="frases-contenedor"><div class="frase-principal" id="frase-pag11-principal"></div><div class="frase-secundaria" id="frase-pag11-secundaria"></div></div></div>

  <div class="pagina" id="pag12">
    <div style="font-size:70px;margin-bottom:30px">💕</div>
    <div class="mensaje-final" id="mensaje-final-dinamico"></div>
  </div>
</div>

<div class="contador" id="contador"></div>
<div class="controles">
  <button id="btnAnterior" onclick="anterior()" title="Anterior">ant.❤️</button>
  <button id="btnSiguiente" onclick="siguiente()" title="Siguiente">sig.❤️</button>
  <button id="btnCerrar" onclick="cerrar()" style="display:none" title="Cerrar">cerrar❤️</button>
</div>

<div class="control-audio" id="audioBtn" onclick="toggleMusica()" title="Click para música">🔊</div>

<script>
let pag=0,total=13,musicaActiva=true,libroAbierto=false,vaquitasActivadas=true;
const musica=document.getElementById('musica');

const frases={
  2:{principal:"Desde el primer momento que te ví, supe que eras el amor de mi vida.",secundaria:"Te amo infinitamente 💕"},
  3:{principal:"Cada día contigo es un regalo especial hermosa.",secundaria:"Eres mi niña bonita 🌹"},
  4:{principal:"Mi hermosa, mi niña... eres lo mejor que me ha pasado en la vida.",secundaria:"Me encantas preciosa 💖"},
  5:{principal:"Juntos hemos vivido momentos inolvidables, cada recuerdo tuyo está en mi corazón.",secundaria:"Te quiero con toda mi alma 💗"},
  6:{principal:"Tu sonrisa es mi debilidad, eres mi todo, mi corazon de melon.",secundaria:"Eres mi razón de ser 🥰"},
  7:{principal:"Quiero tenerte a mi lado siempre mi amor.",secundaria:"Eres mi lugar seguro 💝"},
  8:{principal:"En tus ojos veo mi futuro, en tu corazón encuentro mi hogar.",secundaria:"Construyamos un mundo juntos 🌍"},
  9:{principal:"Cada beso tuyo es felicidad para mi alma, cada abrazo tuyo es un paraíso, preciosa.",secundaria:"Contigo todo tiene sentido 💕"},
  10:{principal:"Eres mi compañera, mi niña bonita, no quiero vivir un solo día sin ti.",secundaria:"Mi amor por ti es infinito 🌹"},
  11:{principal:"5 años contigo y siento que fue ayer, me encantas mi amor.",secundaria:"Feliz aniversario, mi preciosa 💖"}
};

const mensajeFinal=`Daylin, hermosa, preciosa...
Estos 5 años contigo han sido los más hermosos de mi existencia.
En cada momento contigo aprendo a amarte más, a valorarte más.
Te amo infinitamente, eres mi amor, mi todo, mi razón de ser.
Feliz aniversario, mi hermosa. 🌹
Siempre tuyo con todo mi corazón ❤️`;

function escribirTexto(elementoId,texto,velocidad=60){
  const d=document.getElementById(elementoId);
  if(!d)return;
  d.innerHTML='';
  let i=0;
  const e=()=>{
    if(i<texto.length){
      d.innerHTML+=texto[i]==='\n'?'<br>':texto[i];
      i++;
      setTimeout(e,velocidad);
    }
  };
  e();
}

function escribir(){
  const t=`Bienvenida a nuestro libro de amor, preciosa.
Este es un pequeño detalle para ti, un regalo hecho con todo mi corazón.
Cada página representa los momentos más hermosos que hemos compartido.

Te amo mi vida, te amo infinitamente🌹.`;
  escribirTexto('intro-dinamico',t,80);
}

function escribirFrases(numeroPagina){
  if(frases[numeroPagina]){
    const p=frases[numeroPagina].principal;
    const s=frases[numeroPagina].secundaria;
    setTimeout(()=>escribirTexto('frase-pag'+numeroPagina+'-principal',p,60),500);
    setTimeout(()=>escribirTexto('frase-pag'+numeroPagina+'-secundaria',s,60),p.length*60+1000);
  }
}

function mostrar(){
  document.querySelectorAll('.pagina').forEach(p=>p.style.display='none');
  document.getElementById('pag'+pag).style.display='flex';
  document.getElementById('contador').textContent='Página '+(pag+1)+' de '+total;
  document.getElementById('btnAnterior').disabled=pag===0;
  document.getElementById('btnSiguiente').disabled=pag===total-1;
  document.getElementById('btnAnterior').style.opacity=pag===0?'0.4':'1';
  document.getElementById('btnSiguiente').style.opacity=pag===total-1?'0.4':'1';
  
  if(pag===1)setTimeout(escribir,100);
  if(pag>=2 && pag<=11)escribirFrases(pag);
  if(pag===12)setTimeout(()=>escribirTexto('mensaje-final-dinamico',mensajeFinal,80),500);
  
  if(pag>0 && vaquitasActivadas){
    vaquitasActivadas=false;
  }
}

function abrir(){
  document.getElementById('portada').style.display='none';
  document.getElementById('contenedor-libro').style.display='block';
  ['btnAnterior','btnSiguiente','btnCerrar'].forEach(id=>document.getElementById(id).style.display='inline-block');
  pag=0;
  mostrar();
  libroAbierto=true;
  vaquitasActivadas=true;
  
  if(musicaActiva)musica.play();
  
  setInterval(()=>{
    const r=document.createElement('div');
    r.className='rosas';
    r.innerHTML='🌹';
    r.style.left=Math.random()*100+'vw';
    r.style.top='100vh';
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),8100);
  },2500);
  
  setInterval(()=>{
    if(pag===0 && vaquitasActivadas){
      const v=document.createElement('div');
      v.className='vaquita';
      v.innerHTML='🐄';
      v.style.left=Math.random()*100+'vw';
      v.style.top=Math.random()*80+'vh';
      v.style.animationDuration=(8+Math.random()*4)+'s';
      document.body.appendChild(v);
      setTimeout(()=>v.remove(),12000);
    }
  },3000);
}

function siguiente(){
  if(pag<total-1){
    pag++;
    mostrar();
  }
}

function anterior(){
  if(pag>0){
    pag--;
    mostrar();
  }
}

function cerrar(){
  document.getElementById('portada').style.display='block';
  document.getElementById('contenedor-libro').style.display='none';
  ['btnAnterior','btnSiguiente','btnCerrar'].forEach(id=>document.getElementById(id).style.display='none');
  musica.pause();
  libroAbierto=false;
}

function toggleMusica(){
  musicaActiva=!musicaActiva;
  if(musicaActiva){
    musica.play();
    document.getElementById('audioBtn').innerHTML='🔊';
  }else{
    musica.pause();
    document.getElementById('audioBtn').innerHTML='🔇';
  }
}

document.addEventListener('keydown',e=>{
  if(libroAbierto){
    if(e.key==='ArrowLeft')anterior();
    if(e.key==='ArrowRight')siguiente();
  }
});
</script>

</body>
</html>
